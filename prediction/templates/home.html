<!DOCTYPE html>
<html lang="jp">
<head>
    <meta charset="UTF-8">
    <title>画像判定アプリ</title>
</head>
<body>
<h2>犬、猫の画像判定をします</h2>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <input id="img_data" type="hidden" name="img_data" />
     <img id="preview" style="display: none;" />
    <button type="submit">判定</button>
  </form>
  {% if error %}
    <p style="color: red;">{{ error }}</p>
  {% endif %}
  {% if prediction %}
  <div id="prediction">
    <h2>判定結果</h2>
    <p>あなたのアップロードした画像は「{{ prediction }}」でしょう。自信度は{{ confidence|floatformat:1 }}%です。</p>
    <img src="{{ img_data }}">
  </div>
  {% endif %}

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
   <script>
    $(function() {
        $('#id_image').on('change', function() {
        var reader = new FileReader();
        reader.onload = function () {
            $("#preview").attr('src', reader.result);
            $("#preview").show();
            $("#img_data").val(reader.result);
        }
        reader.readAsDataURL(this.files[0]);
        $('#prediction').hide();
        });
    });
  </script>

  <footer style="margin-top:40px; text-align:left; color:#888;">
    <a href="{% url 'disclaimer' %}" target="_blank">免責事項</a>
  </footer>
</body>
</html>
